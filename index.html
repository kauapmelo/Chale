<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chalé Aruana — Seu Refúgio na Natureza</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --verde: #2D6A3F;
  --verde-escuro: #1a4a2a;
  --verde-claro: #4a8c5e;
  --creme: #f5f0e8;
  --texto: #2c2c2a;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Lato', sans-serif;
  background: var(--creme);
  color: var(--texto);
  overflow-x: hidden;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 100;
  background: rgba(45, 106, 63, 0.97);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 2rem;
  box-sizing: border-box;
}

.nav-logo {
  color: white;
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  letter-spacing: 4px;
}

.nav-links {
  display: flex;
  gap: 2rem;
  list-style: none;
}

.nav-links a {
  color: white;
  text-decoration: none;
  font-size: 0.85rem;
}

/* HERO */
.hero {
  height: 100vh;
  position: relative;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background-image: url('imagem1.jpg');
  background-size: cover;
  background-position: center;
  transform: scale(1.05);
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(26,74,42,0.55));
}

.hero-content {
  position: relative;
  z-index: 2;
  color: white;
}

/* SOBRE */
.sobre {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 80vh;
}

.sobre-img {
  background-image: url('imagem2.jpg');
  background-size: cover;
  background-position: center;
}

.sobre-texto {
  background: var(--verde-escuro);
  padding: 5rem;
  color: white;
}

/* ========================= */
/* 🔥 CARROSSEL CORRIGIDO */
/* ========================= */

.carousel-wrapper {
  width: 100%;
  overflow: hidden;
  position: relative;
}

.carousel-track {
  display: flex;
  gap: 1rem;
  width: max-content; /* ✅ FIX IMPORTANTE */
  animation: scroll 25s linear infinite;
  will-change: transform;
}

.carousel-track img {
  height: 320px;
  width: auto;
  border-radius: 10px;
  flex-shrink: 0; /* ❌ impede esticar */
  object-fit: cover;
  transition: transform 0.3s ease;
}

.carousel-track img:hover {
  transform: scale(1.05);
}

/* animação segura */
@keyframes scroll {
  from {
    transform: translateX(0);
  }
  to {
    transform: translateX(-50%);
  }
}

/* COMODIDADES */
.comodidades {
  padding: 5rem 2rem;
  background: var(--verde-escuro);
  color: white;
  text-align: center;
}

/* RESERVA */
.reserva {
  padding: 6rem 2rem;
  text-align: center;
  background: var(--verde);
  color: white;
}

/* FOOTER */
footer {
  background: #111;
  color: white;
  text-align: center;
  padding: 2rem;
}

/* RESPONSIVO */
@media (max-width: 768px) {
  .sobre {
    grid-template-columns: 1fr;
  }

  .sobre-texto {
    padding: 2rem;
  }

  .carousel-track img {
    height: 220px;
  }

  .nav-links {
    display: none;
  }
}
</style>
</head>

<body>

<nav>
  <div class="nav-logo">Aruana</div>
  <ul class="nav-links">
    <li><a href="#sobre">Sobre</a></li>
    <li><a href="#galeria">Galeria</a></li>
    <li><a href="#estrutura">Estrutura</a></li>
    <li><a href="#reserva">Reservas</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1>Aruana</h1>
    <p>Chalé em meio à natureza</p>
  </div>
</section>

<section class="sobre" id="sobre">
  <div class="sobre-img"></div>
  <div class="sobre-texto">
    <h2>Uma experiência única</h2>
    <p>Conforto e natureza em um só lugar.</p>
  </div>
</section>

<!-- 🔥 CARROSSEL CORRIGIDO -->
<section class="galeria" id="galeria">

  <div class="carousel-wrapper">
    <div class="carousel-track">
      <img src="imagem1.jpg">
      <img src="imagem2.jpg">
      <img src="imagem3.jpg">
      <img src="imagem4.jpg">

      <!-- duplicado apenas para loop visual -->
      <img src="imagem1.jpg">
      <img src="imagem2.jpg">
      <img src="imagem3.jpg">
      <img src="imagem4.jpg">
    </div>
  </div>

</section>

<section class="comodidades">
  <h2>Estrutura & Comodidades</h2>
</section>

<section class="reserva" id="reserva">
  <h2>Reserve agora</h2>
</section>

<footer>
  <p>© 2025 Chalé Aruana</p>
</footer>

</body>
</html>
